<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Esercizio D – Maiuscolo</title>
  <style>
    body {
      font-family: monospace;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 1rem;
    }
    h1 { font-size: 1.2rem; }

    textarea {
      width: 320px;
      height: 80px;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 0.5rem;
      border: 1px solid #bbb;
      border-radius: 4px;
      resize: vertical;
    }

    button {
      padding: 0.5rem 1.4rem;
      font-size: 0.95rem;
      font-family: monospace;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #444; }

    #risultato {
      width: 320px;
      min-height: 80px;
      padding: 0.5rem;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      font-size: 0.95rem;
      word-break: break-word;
      color: #000;
    }
    .label {
      font-size: 0.8rem;
      color: #666;
      align-self: flex-start;
      margin-left: calc(50% - 160px);
    }
  </style>
</head>
<body>
  <h1>Esercizio D – Testo in maiuscolo</h1>

  <span class="label">Testo originale (minuscolo):</span>
  <textarea id="inputTesto">ciao mondo! questo è un testo di esempio.</textarea>

  <button onclick="esercizioD()">Converti in MAIUSCOLO</button>

  <span class="label">Risultato (maiuscolo):</span>
  <div id="risultato"></div>

  <script>
    function esercizioD() {
      const input     = document.getElementById("inputTesto");
      const risultato = document.getElementById("risultato");


      input.value = input.value.toLowerCase();

    
      risultato.textContent = input.value.toUpperCase();
    }
  </script>
</body>
</html>
