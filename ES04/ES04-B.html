<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Stampa dei numeri da 100 a 0</title>
</head>
<body>
    <h1>Stampa dei numeri da 100 a 0 saltando da 20 a 20</h1>
    <p>Apri la console del browser (F12) per vedere i risultati.</p>

    <script>
        for (let i = 100; i >= 0; i -= 20) {
 		 console.log(i);
	}
    </script>
</body>
</html>
